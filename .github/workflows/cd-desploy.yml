name: CD - Despliegue a Pages
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Config Pages
        uses: actions/configure-pages@v4
        
      - name: Subir archivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar
        uses: actions/deploy-pages@v4