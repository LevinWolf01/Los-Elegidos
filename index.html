<!DOCTYPE html>
<html lang="ES-es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicios 2do. Treimestre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: white;
            background-attachment: fixed;
            min-height: 100vh;
        }

        center {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        select#actividades {
            padding: 12px 15px;
            font-size: 1.1em;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 300px;
        }

        select#actividades:hover {
            border-color: #45a049;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
            transform: scale(1.02);
        }

        select#actividades:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.7);
            background-color: rgba(0, 0, 0, 0.9);
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            margin: 10px 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #45a049, #3d8b40);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #btnStart {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        #btnStart:hover:not(:disabled) {
            background: linear-gradient(135deg, #1976D2, #1565C0);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        #btnTest {
            background: linear-gradient(135deg, #FF9800, #E68900);
        }

        #btnTest:hover:not(:disabled) {
            background: linear-gradient(135deg, #E68900, #D68000);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        #resultados {
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            max-width: 600px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #resultados h2 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 1.8em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        #resultados p {
            padding: 8px 0;
            font-size: 1em;
            line-height: 1.6;
            border-bottom: 1px solid rgba(76, 175, 80, 0.2);
            transition: all 0.2s ease;
        }

        #resultados p:hover {
            padding-left: 10px;
            color: #4CAF50;
            text-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        #resultados strong {
            color: #FFD700;
            font-size: 1.1em;
        }

        hr {
            border: none;
            border-top: 2px solid rgba(76, 175, 80, 0.3);
            margin: 15px 0;
        }

        i p {
            font-size: 1.1em;
            font-style: italic;
            color: #FFD700;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Scrollbar personalizado */
        #resultados::-webkit-scrollbar {
            width: 8px;
        }

        #resultados::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        #resultados::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 10px;
        }

        #resultados::-webkit-scrollbar-thumb:hover {
            background: #45a049;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.95em;
                margin: 8px 10px;
            }

            select#actividades {
                min-width: 250px;
                font-size: 1em;
            }

            #resultados {
                max-width: 90vw;
                padding: 15px;
            }
        }
    </style>
</head>
<body background="./images/Fondo 2.jpg" text="White">
    <font face="Arial">
        <center>
            <br><br>
            <h1> Actividades del 2do. Trimestre (Algoritmia: JavaScript)</h1>
            <br><br>
            <hr width="92%">
            <br><br>
            <i>
                <p> Por favor, seleccone la actividad que desea Ejecutar:</p>
            </i>
            <select id="actividades">
                <option value="clear"> -- Selecciona una Actividad -- </option>

                <!-- ejercicios especiales -->
                <option value="Exam"> E X A M E N </option>
                <!-- <option value="Exam2"> E X A M E N (V2)</option> -->

                <option value="Act 1">Actividad 1</option>

                <!-- Dificultad = Intermedia -->

                <option value="Act 11">Actividad 11</option>

                <option value="Act 14">Actividad 14</option>
                <option value="Act 15">Actividad 15</option>
                <option value="Act 16">Actividad 16</option>
                <option value="Act 17">Actividad 17</option>

                <option value="Act 21">Actividad 21</option>

                <option value="Act 28">Actividad 28</option>
                <option value="Act 29">Actividad 29</option>
                <option value="Act 30">Actividad 30</option>
            </select>

            <br><br>
            <hr width="20%">
            <button id = "btnStart">Empezar Actividad 🚀</button>
            <button id = "btnTest">Ejecutar Tests 🧪</button>
            <hr width="20%">
            <br><br>


            <hr width="100%">
            <hr width="75%">
            <hr width="50%">
            <hr width="25%">
            <hr width="5%">
            <br><br>

            <div class="result" id="resultados"></div>
            <div id="contenedorForm">
                <div id=""></div>
            </div>

            <br><br>
            <hr width="5%">
            <hr width="25%">
            <hr width="50%">
            <hr width="75%">
            <hr width="100%">

            <script type="module">
                import { ejecutarTests } from './verificarTests.js';

                const btnTest = document.getElementById('btnTest');
                const resultados = document.getElementById('resultados');

                btnTest.addEventListener('click', async () => {
                    btnTest.disabled = true;
                    btnTest.textContent = 'Ejecutando tests... ⏳';
                    resultados.style.color = 'white';
                    resultados.innerHTML = '<p>Verificando ejercicios...</p>';
                    
                    const resultado = await ejecutarTests();
                    resultados.innerHTML = resultado;
                    
                    btnTest.disabled = false;
                    btnTest.textContent = 'Ejecutar Tests 🧪';
                });
            </script>

            <script type="module" src="The Ejecutor.js"></script>
        </center>
    </font>

</body>
</html>
